<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="18%" r="65%">
      <stop offset="0%" stop-color="#1a2e22" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a120e" stop-opacity="1"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bgGlow)"/>
  <rect width="1440" height="900" filter="url(#grain)" opacity="0.35"/>
  <ellipse cx="720" cy="120" rx="420" ry="180" fill="rgba(212,175,55,0.04)"/>
  <ellipse cx="180" cy="720" rx="260" ry="140" fill="rgba(90,120,95,0.05)"/>
  <ellipse cx="1260" cy="640" rx="220" ry="120" fill="rgba(212,175,55,0.03)"/>
</svg>
